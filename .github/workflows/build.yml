# Vimanas — Unity batchmode build
#
# Triggers: push, pull_request
# Linux: StandaloneLinux64. Use UNITY_SERIAL (extract from .ulf for Personal) + UNITY_EMAIL + UNITY_PASSWORD.
# Unity version: auto from ProjectSettings/ProjectVersion.txt
#
# Required GitHub Secrets:
#   Personal:  UNITY_SERIAL (extract from .ulf), UNITY_EMAIL, UNITY_PASSWORD
#   Professional:  UNITY_SERIAL, UNITY_EMAIL, UNITY_PASSWORD
# See platform_learnings.md for serial extraction from Personal .ulf
# See docs/dev_standards/platform_learnings.md for setup details.

name: Build

on:
  push:
  pull_request:

jobs:
  build-linux:
    name: Build Linux (StandaloneLinux64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Vimanas-StandaloneLinux64-${{ hashFiles('ProjectSettings/ProjectVersion.txt', 'Packages/manifest.json') }}
          restore-keys: |
            Library-Vimanas-StandaloneLinux64-

      - name: Prepare license (base64)
        run: |
          if [ -n "$UNITY_LICENSE_BASE64" ]; then
            echo "UNITY_LICENSE<<__ULF_END__" >> $GITHUB_ENV
            echo "$UNITY_LICENSE_BASE64" | base64 -d >> $GITHUB_ENV
            echo "__ULF_END__" >> $GITHUB_ENV
          fi
        env:
          UNITY_LICENSE_BASE64: ${{ secrets.UNITY_LICENSE_BASE64 }}

      - name: Build
        id: build
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ env.UNITY_LICENSE || secrets.UNITY_LICENSE }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: StandaloneLinux64
          allowDirtyBuild: true  # Required: Git LFS + Unity modify files during checkout/build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Build-Linux
          path: build/StandaloneLinux64
