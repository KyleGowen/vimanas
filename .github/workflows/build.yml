# Vimanas — Unity batchmode build (macOS)
#
# Triggers: push, pull_request
# Platform: StandaloneOSX (matches test platform per roadmap)
# Unity version: auto from ProjectSettings/ProjectVersion.txt
#
# Required GitHub Secrets (set one of the two license options):
#   Personal license:  UNITY_LICENSE (or UNITY_LICENSE_BASE64), UNITY_EMAIL, UNITY_PASSWORD
#   Professional:      UNITY_SERIAL, UNITY_EMAIL, UNITY_PASSWORD
# If raw UNITY_LICENSE fails (encoding), use UNITY_LICENSE_BASE64: base64 -i Unity_lic.ulf | pbcopy
# See docs/dev_standards/platform_learnings.md for setup details.

name: Build

on:
  push:
  pull_request:

jobs:
  build-macos:
    name: Build macOS (StandaloneOSX)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Vimanas-StandaloneOSX-${{ hashFiles('ProjectSettings/ProjectVersion.txt', 'Packages/manifest.json') }}
          restore-keys: |
            Library-Vimanas-StandaloneOSX-

      - name: Prepare license (base64)
        if: secrets.UNITY_LICENSE_BASE64 != ''
        run: |
          echo "UNITY_LICENSE<<__ULF_END__" >> $GITHUB_ENV
          echo "${{ secrets.UNITY_LICENSE_BASE64 }}" | base64 -d >> $GITHUB_ENV
          echo "__ULF_END__" >> $GITHUB_ENV

      - name: Build
        id: build
        uses: game-ci/unity-builder@v4
        env:
          # Use decoded base64 when UNITY_LICENSE_BASE64 is set; else raw UNITY_LICENSE
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE_BASE64 != '' && env.UNITY_LICENSE || secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: StandaloneOSX
          allowDirtyBuild: true  # Required: Git LFS + Unity modify files during checkout/build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Build-macOS
          path: build/StandaloneOSX
