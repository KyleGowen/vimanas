# DEPRECATED: Unity no longer supports manual activation of Personal licenses.
# license.unity3d.com no longer accepts Personal .alf uploads.
#
# Use serial extraction instead: activate in Unity Hub locally, then run:
#   grep DeveloperData /Library/Application\ Support/Unity/Unity_lic.ulf | sed -E 's/.*Value="([^"]+)".*/\1/' | base64 -d
# Add the output as UNITY_SERIAL secret with UNITY_EMAIL and UNITY_PASSWORD.
# See docs/dev_standards/platform_learnings.md
#
# This workflow may still work for Professional license users who need .alf generation.

name: Request Unity License

on:
  workflow_dispatch: {}

jobs:
  request-activation-file:
    name: Request manual activation file
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Request manual activation file
        id: getManualLicenseFile
        uses: game-ci/unity-request-activation-file@v2.1.0
        with:
          # 6000.x not supported by action; 2022.3.0f1 works. Personal .ulf is version-agnostic.
          unityVersion: "2022.3.0f1"

      - name: Upload .alf artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.getManualLicenseFile.outputs.filePath }}
          path: ${{ steps.getManualLicenseFile.outputs.filePath }}
