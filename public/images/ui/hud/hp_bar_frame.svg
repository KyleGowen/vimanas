<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 18" width="220" height="18">
  <defs>
    <linearGradient id="hp-copper" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4946A"/>
      <stop offset="30%" style="stop-color:#B87333"/>
      <stop offset="70%" style="stop-color:#9A5A22"/>
      <stop offset="100%" style="stop-color:#B87333"/>
    </linearGradient>
    <linearGradient id="hp-brass-highlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#B5A642;stop-opacity:0.9"/>
      <stop offset="50%" style="stop-color:#B5A642;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#B5A642;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- Background fill (depleted portion) -->
  <rect x="2.5" y="2.5" width="215" height="13" rx="3" ry="3" fill="#3d2914"/>
  <!-- Copper border (2.5px effective) -->
  <rect x="1.25" y="1.25" width="217.5" height="15.5" rx="4" ry="4" fill="none" stroke="url(#hp-copper)" stroke-width="2.5"/>
  <!-- Brass highlight along top edge -->
  <rect x="2.5" y="2.5" width="215" height="2" rx="2" ry="0" fill="url(#hp-brass-highlight)"/>
  <!-- Subtle filigree at corners -->
  <path d="M6 6 L8 4 L10 6" fill="none" stroke="#B5A642" stroke-width="0.8" stroke-opacity="0.6"/>
  <path d="M214 6 L212 4 L210 6" fill="none" stroke="#B5A642" stroke-width="0.8" stroke-opacity="0.6"/>
  <path d="M6 12 L8 14 L10 12" fill="none" stroke="#B5A642" stroke-width="0.8" stroke-opacity="0.6"/>
  <path d="M214 12 L212 14 L210 12" fill="none" stroke="#B5A642" stroke-width="0.8" stroke-opacity="0.6"/>
</svg>
